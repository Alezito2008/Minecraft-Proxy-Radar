<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Minecraft-Proxy Map</title>
</head>
<body>
    <canvas id="map"></canvas>
    <div class="info">
        <span id="info-coordinates">Coordinates: 0 / 0</span>
    </div>
    <div class="map-controls">
        <div class="zoom-controls">
            <div class="mc-button">
                <div class="title" id="zoom-in">
                    <img src="assets/icons/zoom-out.svg" />
                </div>
            </div>
            <div class="mc-button">
                <div class="title" id="zoom-out">
                    <img src="assets/icons/zoom-in.svg" />
                </div>
            </div>
        </div>
    </div>
    <footer>
        <div>
            Minecraft-Proxy Map | Made by <a href="https://github.com/Alezito2008" target="_blank">Alezito2008</a>
        </div>
        <div>
            Version 1.0.0
        </div>
    </footer>
    <script src="map.js"></script>
</body>
</html>
